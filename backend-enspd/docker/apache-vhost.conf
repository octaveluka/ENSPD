<VirtualHost *:10000>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    # Ne jamais servir directement les fichiers sensibles.
    <FilesMatch "\.(sql|md|env|log)$">
        Require all denied
    </FilesMatch>
    <Files "config.php">
        Require all denied
    </Files>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
